<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookTrain · Payment</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚆</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-[Poppins]" id="body_2">

<nav class="backdrop-blur-sm border-b border-orange-200 sticky top-0 z-30 shadow-sm dark:bg-slate-800/90 dark:border-orange-800">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
    <a href="index.html" class="flex items-center gap-2 group" id="logo-link">
      <span class="text-3xl transform group-hover:scale-110 transition duration-300">🚆</span>
      <span class="text-4xl font-bold text-slate-800 dark:text-white tracking-tight">Book<span class="text-orange-600 dark:text-orange-400">Train</span></span>
    </a>
    <ul class="hidden md:flex gap-6 text-slate-600 dark:text-slate-300 font-medium">
      <li><a href="index.html" class="nav-link pb-1 px-0.5">Home</a></li>
      <li><a href="results.html" class="nav-link pb-1 px-0.5">Search</a></li>
      <li><a href="booking.html" class="nav-link pb-1 px-0.5">Booking</a></li>
      <li><a href="ticket.html" class="nav-link pb-1 px-0.5">e-Ticket</a></li>
      <li><a href="pnr.html" class="nav-link pb-1 px-0.5">PNR</a></li>
      <li><a href="history.html" class="nav-link pb-1 px-0.5">History</a></li>
    </ul>
    <button id="darkToggle1" class="text-orange-600 bg-orange-50 p-2 rounded-full hover:bg-orange-100 text-sm dark:bg-orange-900 dark:text-orange-200"><i class="fas fa-moon"></i></button>
  </div>
  <div class="md:hidden flex justify-center gap-4 text-sm pb-2 text-slate-600 dark:text-slate-300">
    <a href="index.html" class="hover:text-orange-600">Home</a>
    <a href="results.html" class="hover:text-orange-600">Search</a>
    <a href="pnr.html" class="hover:text-orange-600">PNR</a>
    <a href="booking.html" class="hover:text-orange-600">Book</a>
    <a href="ticket.html" class="hover:text-orange-600">Ticket</a>
    <a href="history.html" class="hover:text-orange-600">History</a>
  </div>
</nav>

<!-- MAIN -->
<div class="max-w-5xl mx-auto p-6 space-y-8">

  <!-- HEADER -->
  <div class="bg-white p-6 rounded-lg shadow-lg">
    <div class="flex justify-between items-center max-w-3xl mx-auto">
      <h3 class="font-bold sm:text-xl">Complete Payment</h3>
      <p class="px-3 py-1 rounded-full bg-green-400 animate-bounce font-semibold sm:text-sm text-xs">secure payment</p>
    </div>
  </div>

  <!-- BOOKING DETAILS — filled by shared.js -->
  <div class="bg-white p-6 rounded-lg shadow-lg">
    <div class="border border-blue-400 rounded-2xl p-4 max-w-3xl mx-auto space-y-4">
      <div class="flex justify-between flex-wrap gap-2">
        <p class="font-bold sm:text-sm text-xs" id="pay_train_name">🚆 Loading…</p>
        <p class="font-bold sm:text-sm text-xs text-gray-500" id="pay_route">—</p>
      </div>
      <p class="text-xs text-gray-400" id="pay_date"></p>
      <div class="flex justify-between flex-wrap gap-2">
        <div>
          <p class="text-sm sm:text-sm text-xs" id="pay_passengers">Loading passenger info…</p>
          <span class="text-xs text-gray-500" id="pay_tax_note">All taxes included</span>
        </div>
        <p class="text-2xl font-bold text-green-600" id="pay_total">₹ —</p>
      </div>
    </div>
  </div>

  <!-- PAYMENT OPTIONS -->
  <div class="bg-white p-6 rounded-lg shadow-lg">
    <h3 class="text-xl font-bold text-center mb-4 sm:text-sm text-xs">Payment Options</h3>
    <div class="flex flex-col gap-3 max-w-md mx-auto">
      <button class="bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition sm:text-sm text-xs" id="credit_but">💳 Credit/Debit Card</button>
      <button class="bg-green-500 text-white py-2 rounded hover:bg-green-600 transition sm:text-sm text-xs" id="upi_but">📱 UPI</button>
      <button class="bg-yellow-500 text-white py-2 rounded hover:bg-yellow-600 transition sm:text-sm text-xs" id="net_banking_but">🏦 Net Banking</button>
    </div>
  </div>

  <!-- CREDIT CARD SECTION -->
  <div style="display:none;" id="credit_card">
    <div class="flex justify-center">
      <div class="w-96 bg-blue-400 text-white rounded-xl p-6 shadow-xl space-y-4">
        <input class="w-full bg-transparent border-b border-white outline-none placeholder-white" placeholder="Card Holder Name">
        <input class="w-full bg-transparent border-b border-white outline-none placeholder-white" placeholder="Card Number">
        <div class="flex justify-between gap-4">
          <input class="w-1/2 bg-transparent border-b border-white outline-none placeholder-white" placeholder="MM/YY">
          <input class="w-1/2 bg-transparent border-b border-white outline-none placeholder-white" placeholder="OTP">
        </div>
        <div class="flex justify-between items-center">
          <button class="bg-white text-blue-500 px-3 py-1 rounded">Verify OTP</button>
        </div>
      </div>
    </div>
    <div class="flex justify-center mt-4">
      <button class="bg-green-500 text-white px-8 py-3 rounded-lg hover:bg-green-600 transition font-semibold">PAY</button>
    </div>
  </div>

  <!-- UPI SECTION -->
  <div class="flex justify-center mt-6 gap-4 flex-col m-5" style="display:none;" id="upi_num">
    <input type="text" placeholder="UPI ID" class="border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <input type="password" placeholder="UPI Password" class="border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <button class="bg-green-500 text-white px-8 py-3 rounded-lg hover:bg-green-600 transition font-semibold">PAY</button>
  </div>

  <!-- NET BANKING SECTION -->
  <div class="flex justify-center mt-6 gap-4 flex-col m-5 sm:text-sm text-xs" style="display:none;" id="net_banking">
    <select class="border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-sm text-xs">
      <option value="">Select Bank</option>
      <option value="hdfc">HDFC Bank</option>
      <option value="sbi">State Bank of India</option>
      <option value="icici">ICICI Bank</option>
      <option value="axis">Axis Bank</option>
    </select>
    <input type="number" placeholder="Account Number" class="border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 m-2 sm:text-sm text-xs">
    <input type="number" placeholder="IFSC Code" class="border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 m-2 sm:text-sm text-xs">
    <input type="text" placeholder="Account Holder Name" class="border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 m-2 sm:text-sm text-xs">
    <input type="text" placeholder="OTP" class="border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 m-2 sm:text-sm text-xs">
    <button class="bg-green-500 text-white px-8 py-3 rounded-lg hover:bg-green-600 transition font-semibold">PAY</button>
  </div>

</div><!-- /max-w-5xl -->

<style>
  body { margin:0; min-height:100vh; background-image:url('image-b/s2.png');
    background-size:cover; background-position:center;
    background-repeat:no-repeat; background-attachment:fixed; }
</style>

<!-- SCRIPT ORDER: data.js → shared.js → payment.js → script.js -->
<script src="assets/js/data.js"></script>
<script src="shared.js"></script>
<script src="payment.js"></script>
<script src="assets/js/script.js"></script>
</body>
</html>
